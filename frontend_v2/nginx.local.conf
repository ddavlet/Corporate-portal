server {
  listen 80;
  server_name _;

  # SPA is mounted under /app/ — send browsers there from bare /
  location = / {
    # Preserve host:port (e.g. localhost:3000) — bare `return /app/` becomes absolute without port
    return 302 $scheme://$http_host/app/;
  }

  location = /app {
    return 301 /app/;
  }

  location /app/ {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /app/index.html;
  }

  location /api/ {
    proxy_pass http://backend_v2:8001;
    # Backend resolves tenant from Host subdomain (BASE_DOMAIN=localhost → test.localhost → tenant "test").
    # Plain "localhost" has no subdomain → TenantSubdomainMiddleware returns 404.
    proxy_set_header Host test.localhost;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }
}
