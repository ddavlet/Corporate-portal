<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Номер платежного поручения</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            min-height: 100vh;
        }

        .container {
            max-width: 360px;
            margin: 0 auto;
        }

        h1 {
            font-size: 18px;
            font-weight: 600;
            margin: 0 0 16px;
            color: var(--tg-theme-text-color, #000);
        }

        .field {
            margin-bottom: 20px;
        }

        .field label {
            display: block;
            font-size: 14px;
            color: var(--tg-theme-hint-color, #999);
            margin-bottom: 6px;
        }

        .field input {
            width: 100%;
            padding: 12px 14px;
            font-size: 16px;
            border: 1px solid var(--tg-theme-hint-color, #ddd);
            border-radius: 10px;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            -webkit-appearance: none;
            appearance: none;
        }

        .field input:focus {
            outline: none;
            border-color: var(--tg-theme-button-color, #2481cc);
        }

        .field input::placeholder {
            color: var(--tg-theme-hint-color, #999);
        }

        .field .error {
            font-size: 12px;
            color: #e53935;
            margin-top: 4px;
            display: none;
        }

        .field input.invalid+.error {
            display: block;
        }

        .btn {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #fff);
            cursor: pointer;
        }

        .btn:active {
            opacity: 0.9;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Номер платежного поручения</h1>
        <form id="form">
            <div class="field">
                <label for="orderNumber">Номер платежного поручения</label>
                <input type="text" inputmode="numeric" pattern="[0-9]*" id="orderNumber" name="orderNumber"
                    placeholder="Только цифры" autocomplete="off" maxlength="20" />
                <span class="error" id="error">Введите только цифры</span>
            </div>
            <button type="button" class="btn" id="submitBtn">Отправить</button>
        </form>
    </div>

    <script>
        // Set your n8n webhook URL for Direct Link mode (required when opening via t.me/bot/AppName?startapp=...)
        const WEBHOOK_URL = 'https://lemonfit.kolberg.uz/bank-payment'; // e.g. 'https://your-n8n.com/webhook/lemonfit'

        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        const form = document.getElementById('form');
        const input = document.getElementById('orderNumber');
        const errorEl = document.getElementById('error');

        // start_param format: "organization_chatId_rid" (e.g. lemonfit_-1003013413461_627) or "chatId_rid"
        function getContext() {
            const urlParams = new URLSearchParams(window.location.search);
            let organization = urlParams.get('organization') || '';
            let chatId = urlParams.get('chat_id') || '';
            let rid = urlParams.get('rid') || '';
            const startParam = tg?.initDataUnsafe?.start_param || urlParams.get('tgWebAppStartParam') || '';
            if (startParam) {
                const parts = startParam.split('_');
                if (parts.length >= 3) {
                    organization = parts[0];
                    chatId = parts[1];
                    rid = parts[2];
                } else if (parts.length === 2) {
                    chatId = parts[0];
                    rid = parts[1];
                } else {
                    chatId = chatId || startParam;
                }
            }
            return { organization, chat_id: chatId, rid };
        }

        function isNumbersOnly(str) {
            return /^\d+$/.test(str);
        }

        input.addEventListener('input', function () {
            this.value = this.value.replace(/\D/g, '');
            this.classList.remove('invalid');
            errorEl.style.display = 'none';
        });

        input.addEventListener('paste', function (e) {
            e.preventDefault();
            const text = (e.clipboardData || window.clipboardData).getData('text');
            this.value = text.replace(/\D/g, '');
        });

        async function doSubmit() {
            const value = input.value.trim();

            if (!value) {
                input.classList.add('invalid');
                errorEl.textContent = 'Введите номер';
                errorEl.style.display = 'block';
                return;
            }
            if (!isNumbersOnly(value)) {
                input.classList.add('invalid');
                errorEl.textContent = 'Введите только цифры';
                errorEl.style.display = 'block';
                return;
            }

            input.classList.remove('invalid');
            errorEl.style.display = 'none';

            const ctx = getContext();
            const payloadObj = { orderNumber: value };
            if (ctx.organization) payloadObj.organization = ctx.organization;
            if (ctx.chat_id) payloadObj.chat_id = ctx.chat_id;
            if (ctx.rid) payloadObj.rid = ctx.rid;
            if (tg?.initDataUnsafe?.user?.id) payloadObj.telegram_user_id = tg.initDataUnsafe.user.id;
            if (tg?.initData) payloadObj.initData = tg.initData;

            const btn = document.getElementById('submitBtn');

            if (WEBHOOK_URL) {
                btn.disabled = true;
                btn.textContent = 'Отправка…';
                try {
                    let url = WEBHOOK_URL;
                    if (ctx.organization) {
                        url += (url.includes('?') ? '&' : '?') + 'organization=' + encodeURIComponent(ctx.organization);
                    }
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payloadObj),
                    });
                    if (res.ok) {
                        const okMsg = encodeURIComponent('Подтверждено');
                        if (tg?.showAlert) {
                            tg.showAlert('Подтверждено');
                            setTimeout(function () { if (tg?.close) tg.close(); }, 2000);
                        } else {
                            errorEl.textContent = 'Подтверждено';
                            errorEl.style.display = 'block';
                            errorEl.style.color = 'var(--tg-theme-button-color, #2481cc)';
                            setTimeout(function () {
                                window.location.href = 'success.html?message=' + okMsg;
                            }, 2000);
                        }
                        return;
                    }
                    if (res.status === 403) {
                        const errMsg = encodeURIComponent('Ошибка доступа');
                        if (tg?.showAlert) {
                            tg.showAlert('Ошибка доступа');
                            setTimeout(function () { if (tg?.close) tg.close(); }, 3000);
                        } else {
                            errorEl.textContent = 'Ошибка доступа';
                            errorEl.style.display = 'block';
                            setTimeout(function () {
                                window.location.href = 'error.html?message=' + errMsg;
                            }, 3000);
                        }
                        return;
                    }
                    errorEl.textContent = 'Ошибка ' + res.status + '. Попробуйте ещё раз.';
                    errorEl.style.display = 'block';
                } catch (err) {
                    errorEl.textContent = 'Ошибка отправки. Попробуйте ещё раз.';
                    errorEl.style.display = 'block';
                }
                btn.disabled = false;
                btn.textContent = 'Отправить';
                return;
            }

            if (tg?.sendData) {
                tg.sendData(JSON.stringify(payloadObj));
                if (tg?.close) tg.close();
            } else {
                if (tg?.showAlert) tg.showAlert('Номер: ' + value);
                else alert('Номер: ' + value);
            }
        }

        document.getElementById('submitBtn').addEventListener('click', function () {
            doSubmit();
        });

        form.addEventListener('submit', function (e) {
            e.preventDefault();
            doSubmit();
        });
    </script>
</body>

</html>
