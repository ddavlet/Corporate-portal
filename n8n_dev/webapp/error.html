<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Ошибка</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 360px;
            margin: 0 auto;
            text-align: center;
        }
        .icon {
            font-size: 48px;
            margin-bottom: 16px;
            line-height: 1;
        }
        h1 {
            font-size: 18px;
            font-weight: 600;
            margin: 0 0 12px;
            color: var(--tg-theme-text-color, #000);
        }
        .message {
            font-size: 15px;
            line-height: 1.45;
            color: var(--tg-theme-hint-color, #666);
            margin-bottom: 24px;
        }
        .btn {
            display: inline-block;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #fff);
            cursor: pointer;
            text-decoration: none;
        }
        .btn:active {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon" aria-hidden="true">⚠️</div>
        <h1>Что-то пошло не так</h1>
        <p class="message" id="message">Проверьте данные и попробуйте ещё раз.</p>
        <button type="button" class="btn" id="closeBtn">Понятно</button>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        const params = new URLSearchParams(window.location.search);
        const customMessage = params.get('message');
        const messageEl = document.getElementById('message');

        if (customMessage) {
            messageEl.textContent = decodeURIComponent(customMessage);
        }

        document.getElementById('closeBtn').addEventListener('click', function () {
            if (tg?.close) {
                tg.close();
            } else {
                window.history.back();
            }
        });
    </script>
</body>
</html>
