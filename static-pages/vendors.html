<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Поставщики</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>Поставщики</h1>
        <div class="sub">Список поставщиков из контрактов. Нажмите на строку, чтобы открыть детали и заявки.</div>
      </div>
      <div class="controls">
        <a class="btn" href="/requests" title="К заявкам">← Заявки</a>
        <button id="reloadBtn" title="Загрузить свежие данные">Обновить</button>
      </div>
    </header>

    <div class="card">
      <div class="table-wrap">
        <table id="tbl" aria-label="Таблица поставщиков">
          <colgroup>
            <col style="width: 520px" />
            <col style="width: 140px" />
            <col style="width: 240px" />
          </colgroup>
          <thead>
            <tr>
              <th>Поставщик</th>
              <th class="right">Контрактов</th>
              <th class="hide-sm">Валюта / статус</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <div class="footer">
        <div class="small muted" id="meta"></div>
        <div class="small muted">Подсказка: нажмите на любую строку</div>
      </div>
    </div>

    <!-- Modal -->
    <div id="modal">
      <div id="modalOverlay"></div>
      <div id="modalPanel" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div id="modalHeader">
          <div style="min-width:0">
            <div id="modalTitle" class="truncate">Поставщик</div>
            <div id="modalSub" class="small muted truncate"></div>
          </div>
          <button id="modalClose" title="Закрыть">Закрыть</button>
        </div>
        <div id="modalBody"></div>
      </div>
    </div>
  </div>

  <script>
    const CURRENT_HOST = (location && location.host) || "neuron.kolberg.uz";
    const VENDORS_API_URL = `https://${CURRENT_HOST}/vendors-data`;
    const VENDOR_REQUESTS_API_URL = `https://${CURRENT_HOST}/vendor-request-data`;

    const $ = (s) => document.querySelector(s);

    function escapeHtml(s) {
      return String(s ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function fmtMoney(amountStr) {
      const n = Number(amountStr);
      if (!Number.isFinite(n)) return amountStr ?? "";
      return n.toLocaleString("uz-UZ", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function fmtDate(iso) {
      if (!iso) return "";
      const d = new Date(iso);
      if (isNaN(d.getTime())) return iso;
      return d.toLocaleString("ru-RU", { year: "numeric", month: "2-digit", day: "2-digit" });
    }

    function setMeta(text) {
      const el = $("#meta");
      if (el) el.textContent = text;
    }

    function statusBadge(status) {
      const s = String(status ?? "");
      const map = {
        "APPROVED": { cls: "ok", label: "APPROVED" },
        "REJECTED": { cls: "bad", label: "REJECTED" },
        "PAYED": { cls: "payed", label: "PAYED" },
        "pending": { cls: "warn", label: "PENDING" },
        "1": { cls: "warn", label: "STATUS 1" },
        "2": { cls: "warn", label: "STATUS 2" },
        "3": { cls: "warn", label: "STATUS 3" }
      };
      const m = map[s] || { cls: "warn", label: (s || "—") };
      return `<span class="pill"><span class="dot ${m.cls}"></span>${escapeHtml(m.label)}</span>`;
    }

    function normalizeVendorKey(name) {
      return String(name ?? "")
        .trim()
        .replace(/\s+/g, " ")
        .toLowerCase();
    }

    function asArray(data, key) {
      const arr = data?.[key];
      return Array.isArray(arr) ? arr : [];
    }

    let vendors = []; // [{key,name,contracts:[...]}]
    let vendorMap = new Map(); // key -> vendorObj
    let requestsIndex = null; // Map<vendorKey, request[]>

    async function fetchJson(url) {
      const isNullOrigin = (location.origin === "null") || (location.protocol === "file:");
      const res = await fetch(url, {
        method: "GET",
        credentials: isNullOrigin ? "omit" : "include",
        headers: { "Accept": "application/json" }
      });
      if (!res.ok) throw new Error(`HTTP ${res.status} ${res.statusText}`);
      return await res.json();
    }

    async function loadVendors() {
      setMeta("Загрузка поставщиков…");
      const data = await fetchJson(VENDORS_API_URL);
      const contracts = asArray(data, "contracts").map(x => x?.json ?? x).filter(Boolean);

      vendorMap = new Map();
      for (const c of contracts) {
        const name = String(c.vendor ?? "").trim();
        const key = normalizeVendorKey(name);
        if (!key) continue;
        if (!vendorMap.has(key)) vendorMap.set(key, { key, name, contracts: [] });
        vendorMap.get(key).contracts.push(c);
      }

      vendors = Array.from(vendorMap.values()).sort((a, b) => a.name.localeCompare(b.name, "ru-RU"));
      renderTable();
      setMeta(`Поставщиков: ${vendors.length}`);
    }

    function renderTable() {
      const tbody = $("#tbl tbody");
      if (!tbody) return;
      tbody.innerHTML = vendors.map(v => {
        const cur = Array.from(new Set(v.contracts.map(c => c.currency).filter(Boolean))).join(", ") || "—";
        const st = Array.from(new Set(v.contracts.map(c => c.contract_status).filter(Boolean))).join(", ") || "—";
        return `
          <tr data-vendor="${escapeHtml(v.key)}">
            <td class="truncate">${escapeHtml(v.name)}</td>
            <td class="right nowrap mono">${escapeHtml(v.contracts.length)}</td>
            <td class="truncate hide-sm">${escapeHtml(cur)} • ${escapeHtml(st)}</td>
          </tr>
        `;
      }).join("");
    }

    function closeModal() {
      const modal = $("#modal");
      if (modal) modal.style.display = "none";
    }

    async function ensureRequestsIndex() {
      if (requestsIndex) return;
      setMeta("Загрузка заявок поставщиков…");
      const data = await fetchJson(VENDOR_REQUESTS_API_URL);
      const reqItems = (Array.isArray(data) ? data : asArray(data, "requests")).map(x => x?.json ?? x).filter(Boolean);

      requestsIndex = new Map();
      for (const r of reqItems) {
        const key = normalizeVendorKey(r.vendor);
        if (!key) continue;
        if (!requestsIndex.has(key)) requestsIndex.set(key, []);
        requestsIndex.get(key).push(r);
      }
    }

    function openVendorModal(vendor) {
      const modal = $("#modal");
      const title = $("#modalTitle");
      const sub = $("#modalSub");
      const body = $("#modalBody");
      if (!modal || !title || !sub || !body) return;

      const reqs = (requestsIndex?.get(vendor.key) || []).slice().sort((a, b) =>
        new Date(b.submitted_at || 0).getTime() - new Date(a.submitted_at || 0).getTime()
      );

      title.textContent = vendor.name;
      sub.textContent = `Контрактов: ${vendor.contracts.length} • Заявок: ${reqs.length}`;

      const contractsHtml = vendor.contracts.map(c => `
        <div class="kv">
          <div class="k">Контракт #${escapeHtml(c.id ?? "—")}</div>
          <div class="v">
            <div class="tight">${escapeHtml(c.contract_number ?? "—")} • ${escapeHtml(c.contract_terms ?? "—")}</div>
            <div class="small muted tight">
              ${escapeHtml(fmtDate(c.date_from))} → ${escapeHtml(fmtDate(c.date_to))} •
              ${escapeHtml(fmtMoney(c.contract_amount))} ${escapeHtml(c.currency ?? "")} •
              ${escapeHtml(c.contract_status ?? "")}
            </div>
            ${c.acc_number ? `<div class="small muted tight mono">Р/с: ${escapeHtml(c.acc_number)}</div>` : ``}
            ${c.file_link ? `<div class="small tight"><a class="btn" href="${escapeHtml(c.file_link)}" target="_blank" rel="noopener">Файл</a></div>` : ``}
          </div>
        </div>
      `).join("");

      const requestsHtml = `
        <div class="section">
          <div class="sectionTitle">
            <div class="label">Заявки</div>
            <div class="small muted">(${reqs.length})</div>
          </div>
          <div class="table-wrap" style="border:1px solid var(--border); border-radius: 12px; overflow:hidden;">
            <table aria-label="Заявки поставщика" style="min-width: 860px;">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Название</th>
                  <th class="right">Сумма</th>
                  <th>Статус</th>
                  <th class="hide-sm">Заявитель</th>
                  <th class="hide-sm">Отправлено</th>
                </tr>
              </thead>
              <tbody>
                ${reqs.length ? reqs.map(r => `
                  <tr>
                    <td class="mono nowrap">${escapeHtml(r.id)}</td>
                    <td style="min-width:0">
                      <div class="tight truncate">${escapeHtml(r.title || "—")}</div>
                      ${r.payment_purpose ? `<div class="small muted tight truncate">${escapeHtml(r.payment_purpose)}</div>` : ``}
                    </td>
                    <td class="right nowrap mono">${escapeHtml(fmtMoney(r.amount))} ${escapeHtml(r.currency || "")}</td>
                    <td>${statusBadge(r.status)}</td>
                    <td class="truncate hide-sm">${escapeHtml(r.requester || "—")}</td>
                    <td class="nowrap mono hide-sm">${escapeHtml(fmtDate(r.submitted_at))}</td>
                  </tr>
                `).join("") : `<tr><td colspan="6" class="small muted">Нет заявок</td></tr>`}
              </tbody>
            </table>
          </div>
        </div>
      `;

      body.innerHTML = `
        <div class="section">
          <div class="sectionTitle">
            <div class="label">Контракты</div>
            <div class="small muted">(${vendor.contracts.length})</div>
          </div>
          <div class="grid">
            ${contractsHtml || `<div class="kv"><div class="k">Контракты</div><div class="v small muted">—</div></div>`}
          </div>
        </div>
        ${requestsHtml}
      `;

      modal.style.display = "block";
    }

    async function onRowClick(vendorKey) {
      const vendor = vendorMap.get(vendorKey);
      if (!vendor) return;
      try {
        await ensureRequestsIndex();
      } catch (e) {
        // If the endpoint is protected and returns nothing, still show contracts.
        requestsIndex = requestsIndex || new Map();
        console.error(e);
      }
      openVendorModal(vendor);
      setMeta(`Поставщиков: ${vendors.length}`);
    }

    function bindOnce() {
      if (bindOnce._done) return;
      bindOnce._done = true;

      const reloadBtn = $("#reloadBtn");
      if (reloadBtn) reloadBtn.addEventListener("click", () => loadVendors());

      const tbody = $("#tbl tbody");
      if (tbody) {
        tbody.addEventListener("click", (e) => {
          const tr = e.target.closest("tr[data-vendor]");
          if (!tr) return;
          onRowClick(String(tr.getAttribute("data-vendor") || ""));
        });
      }

      const overlay = $("#modalOverlay");
      const closeBtn = $("#modalClose");
      if (overlay) overlay.addEventListener("click", closeModal);
      if (closeBtn) closeBtn.addEventListener("click", closeModal);
      document.addEventListener("keydown", (ev) => { if (ev.key === "Escape") closeModal(); });
    }

    bindOnce();
    window.addEventListener("DOMContentLoaded", () => loadVendors());
  </script>
</body>
</html>
