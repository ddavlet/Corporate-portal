server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index requests.html;

    location = /requests {
        try_files /requests.html =404;
    }

    location /requests/ {
        alias /usr/share/nginx/html/;
        try_files /requests.html =404;
    }

    location / {
        return 404;
    }
}
