services:

  db:
    image: pgvector/pgvector:pg17-trixie
    restart: always
    container_name: db
    command: ["postgres", "-c", "timezone=Europe/Berlin"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${GENERIC_TIMEZONE}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    # >>> CHANGE: db только во внутренней сети
    networks:
      - backend


  adminer:
    image: adminer:latest
    restart: always
    container_name: adminer
    depends_on:
      db:
        condition: service_started
    labels:
      - traefik.enable=true
      - traefik.docker.network=n8n_traefik-public
      - traefik.http.routers.adminer.rule=Host(`database.kolberg.uz`)
      - traefik.http.routers.adminer.tls=true
      - traefik.http.routers.adminer.entrypoints=web,websecure
      - traefik.http.routers.adminer.tls.certresolver=mytlschallenge
      - traefik.http.middlewares.adminer.headers.SSLRedirect=true
      - traefik.http.middlewares.adminer.headers.STSSeconds=315360000
      - traefik.http.middlewares.adminer.headers.browserXSSFilter=true
      - traefik.http.middlewares.adminer.headers.contentTypeNosniff=true
      - traefik.http.middlewares.adminer.headers.forceSTSHeader=true
      - traefik.http.middlewares.adminer.headers.SSLHost=kolberg.uz
      - traefik.http.middlewares.adminer.headers.STSIncludeSubdomains=true
      - traefik.http.middlewares.adminer.headers.STSPreload=true
      - traefik.http.routers.adminer.middlewares=adminer@docker
      - traefik.http.services.adminer.loadbalancer.server.port=8080
    # >>> CHANGE: adminer в public (для traefik) и backend (для db)
    networks:
      - traefik-public
      - backend


  traefik:
    image: "traefik"
    restart: always
    container_name: traefik
    command:
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.mytlschallenge.acme.tlschallenge=true"
      - "--certificatesresolvers.mytlschallenge.acme.email=${SSL_EMAIL}"
      - "--certificatesresolvers.mytlschallenge.acme.storage=/letsencrypt/acme.json"
      - "--log.level=DEBUG"

    ports:
      - "80:80"
      - "443:443"
    volumes:
      - traefik_data:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
    # >>> CHANGE: traefik только в public
    networks:
      - traefik-public

  browserless:
    image: browserless/chrome:latest
    restart: unless-stopped
    environment:
      - TOKEN=${BROWSERLESS_TOKEN}
      - MAX_CONCURRENT_SESSIONS=2
    networks:
      - chromium

  n8n:
    image: docker.n8n.io/n8nio/n8n
    restart: always
    container_name: n8n
    labels:
       - traefik.enable=true
       - traefik.docker.network=n8n_traefik-public
       # >>> CHANGE: можно убрать (не нужно для traefik)
       # - traefik.container.name=traefik
      # ---------- Shared security headers middleware ----------
       - traefik.http.middlewares.n8n.headers.SSLRedirect=true
       - traefik.http.middlewares.n8n.headers.STSSeconds=315360000
       - traefik.http.middlewares.n8n.headers.browserXSSFilter=true
       - traefik.http.middlewares.n8n.headers.contentTypeNosniff=true
       - traefik.http.middlewares.n8n.headers.forceSTSHeader=true
       - traefik.http.middlewares.n8n.headers.SSLHost=kolberg.uz
       - traefik.http.middlewares.n8n.headers.STSIncludeSubdomains=true
       - traefik.http.middlewares.n8n.headers.STSPreload=true

      # ---------- CORS middleware for dev.kolberg.uz  ----------
       - traefik.http.middlewares.n8n-dev-cors.headers.accessControlAllowOriginList=https://neuron.kolberg.uz,https://construction.kolberg.uz,https://lemonfit.kolberg.uz,https://main.kolberg.uz
       - traefik.http.middlewares.n8n-dev-cors.headers.accessControlAllowMethods=GET,POST,OPTIONS
       - traefik.http.middlewares.n8n-dev-cors.headers.accessControlAllowHeaders=Content-Type,Authorization
       - traefik.http.middlewares.n8n-dev-cors.headers.addVaryHeader=true

      # ---------- UI on dev.kolberg.uz ----------
       - traefik.http.routers.n8n-ui.rule=Host(`dev.kolberg.uz`)
       - traefik.http.routers.n8n-ui.entrypoints=web,websecure
       - traefik.http.routers.n8n-ui.tls=true
       - traefik.http.routers.n8n-ui.tls.certresolver=mytlschallenge
       - traefik.http.routers.n8n-ui.middlewares=n8n@docker,n8n-dev-cors@docker,n8n-error-pages@docker
       - traefik.http.routers.n8n-ui.service=n8n

      # ---------- Webhooks & Forms for lemonfit.kolberg.uz ----------
       - traefik.http.routers.n8n-webhook-lemonfit.rule=Host(`lemonfit.kolberg.uz`)
       - traefik.http.routers.n8n-webhook-lemonfit.entrypoints=web,websecure
       - traefik.http.routers.n8n-webhook-lemonfit.tls=true
       - traefik.http.routers.n8n-webhook-lemonfit.tls.certresolver=mytlschallenge
       - traefik.http.middlewares.n8n-lemonfit-webhook.replacepathregex.regex=^/(.*)$
       - traefik.http.middlewares.n8n-lemonfit-webhook.replacepathregex.replacement=/webhook/lemonfit/$1

       - traefik.http.routers.n8n-webhook-lemonfit.middlewares=n8n-lemonfit-webhook@docker,n8n@docker,n8n-error-pages@docker
       - traefik.http.routers.n8n-webhook-lemonfit.service=n8n

      # ---------- Webhooks & Forms for construction.kolberg.uz ----------
       - traefik.http.routers.n8n-webhook-construction.rule=Host(`construction.kolberg.uz`)
       - traefik.http.routers.n8n-webhook-construction.entrypoints=web,websecure
       - traefik.http.routers.n8n-webhook-construction.tls=true
       - traefik.http.routers.n8n-webhook-construction.tls.certresolver=mytlschallenge
       - traefik.http.middlewares.n8n-construction-webhook.replacepathregex.regex=^/(.*)$
       - traefik.http.middlewares.n8n-construction-webhook.replacepathregex.replacement=/webhook/construction/$1

       - traefik.http.routers.n8n-webhook-construction.middlewares=n8n-construction-webhook@docker,n8n@docker,n8n-error-pages@docker
       - traefik.http.routers.n8n-webhook-construction.service=n8n

      # ---------- Webhooks & Forms for neuron.kolberg.uz ----------
       - traefik.http.routers.n8n-webhook-neuron.rule=Host(`neuron.kolberg.uz`)
       - traefik.http.routers.n8n-webhook-neuron.entrypoints=web,websecure
       - traefik.http.routers.n8n-webhook-neuron.tls=true
       - traefik.http.routers.n8n-webhook-neuron.tls.certresolver=mytlschallenge
       - traefik.http.middlewares.n8n-neuron-webhook.replacepathregex.regex=^/(.*)$
       - traefik.http.middlewares.n8n-neuron-webhook.replacepathregex.replacement=/webhook/neuron/$1
       - traefik.http.routers.n8n-webhook-neuron.middlewares=n8n-neuron-webhook@docker,n8n@docker,n8n-error-pages@docker
       - traefik.http.routers.n8n-webhook-neuron.service=n8n

      # ---------- Webhooks & Forms for lemonfit2.kolberg.uz ----------
       - traefik.http.routers.n8n-webhook-lemonfit2.rule=Host(`lemonfit2.kolberg.uz`)
       - traefik.http.routers.n8n-webhook-lemonfit2.entrypoints=web,websecure
       - traefik.http.routers.n8n-webhook-lemonfit2.tls=true
       - traefik.http.routers.n8n-webhook-lemonfit2.tls.certresolver=mytlschallenge
       - traefik.http.middlewares.n8n-lemonfit2-webhook.replacepathregex.regex=^/(.*)$
       - traefik.http.middlewares.n8n-lemonfit2-webhook.replacepathregex.replacement=/webhook/lemonfit2/$1
       - traefik.http.routers.n8n-webhook-lemonfit2.middlewares=n8n-lemonfit2-webhook@docker,n8n@docker,n8n-error-pages@docker
       - traefik.http.routers.n8n-webhook-lemonfit2.service=n8n

      # ---------- Webhooks & Forms for main.kolberg.uz ----------
       - traefik.http.routers.n8n-webhook-main.rule=Host(`main.kolberg.uz`)
       - traefik.http.routers.n8n-webhook-main.entrypoints=web,websecure
       - traefik.http.routers.n8n-webhook-main.tls=true
       - traefik.http.routers.n8n-webhook-main.tls.certresolver=mytlschallenge
       - traefik.http.middlewares.n8n-main-webhook.replacepathregex.regex=^/(.*)$
       - traefik.http.middlewares.n8n-main-webhook.replacepathregex.replacement=/webhook/main/$1
       - traefik.http.routers.n8n-webhook-main.middlewares=n8n-main-webhook@docker,n8n@docker,n8n-error-pages@docker
       - traefik.http.routers.n8n-webhook-main.service=n8n

      # ---------- Webhooks & Forms for zarqand.kolberg.uz ----------
       - traefik.http.routers.n8n-webhook-zarqand.rule=Host(`zarqand.kolberg.uz`)
       - traefik.http.routers.n8n-webhook-zarqand.entrypoints=web,websecure
       - traefik.http.routers.n8n-webhook-zarqand.tls=true
       - traefik.http.routers.n8n-webhook-zarqand.tls.certresolver=mytlschallenge
       - traefik.http.middlewares.n8n-zarqand-webhook.replacepathregex.regex=^/(.*)$
       - traefik.http.middlewares.n8n-zarqand-webhook.replacepathregex.replacement=/webhook/zarqand/$1
       - traefik.http.routers.n8n-webhook-zarqand.middlewares=n8n-zarqand-webhook@docker,n8n@docker,n8n-error-pages@docker
       - traefik.http.routers.n8n-webhook-zarqand.service=n8n

      # ---------- Webhooks & Forms for invest.kolberg.uz ----------
       - traefik.http.routers.n8n-webhook-invest.rule=Host(`invest.kolberg.uz`)
       - traefik.http.routers.n8n-webhook-invest.entrypoints=web,websecure
       - traefik.http.routers.n8n-webhook-invest.tls=true
       - traefik.http.routers.n8n-webhook-invest.tls.certresolver=mytlschallenge
       - traefik.http.middlewares.n8n-invest-webhook.replacepathregex.regex=^/(.*)$
       - traefik.http.middlewares.n8n-invest-webhook.replacepathregex.replacement=/webhook/invest/$1
       - traefik.http.routers.n8n-webhook-invest.middlewares=n8n-invest-webhook@docker,n8n@docker,n8n-error-pages@docker
       - traefik.http.routers.n8n-webhook-invest.service=n8n


      # ---------- Webhooks & Forms for syrop.kolberg.uz ----------
       - traefik.http.routers.n8n-webhook-syrop.rule=Host(`syrop.kolberg.uz`)
       - traefik.http.routers.n8n-webhook-syrop.entrypoints=web,websecure
       - traefik.http.routers.n8n-webhook-syrop.tls=true
       - traefik.http.routers.n8n-webhook-syrop.tls.certresolver=mytlschallenge
       - traefik.http.middlewares.n8n-syrop-webhook.replacepathregex.regex=^/(.*)$
       - traefik.http.middlewares.n8n-syrop-webhook.replacepathregex.replacement=/webhook/syrop/$1
       - traefik.http.routers.n8n-webhook-syrop.middlewares=n8n-syrop-webhook@docker,n8n@docker,n8n-error-pages@docker
       - traefik.http.routers.n8n-webhook-syrop.service=n8n

      # ---------- Webhooks & Forms for qulay.kolberg.uz ----------
       - traefik.http.routers.n8n-webhook-qulay.rule=Host(`qulay.kolberg.uz`)
       - traefik.http.routers.n8n-webhook-qulay.entrypoints=web,websecure
       - traefik.http.routers.n8n-webhook-qulay.tls=true
       - traefik.http.routers.n8n-webhook-qulay.tls.certresolver=mytlschallenge
       - traefik.http.middlewares.n8n-qulay-webhook.replacepathregex.regex=^/(.*)$
       - traefik.http.middlewares.n8n-qulay-webhook.replacepathregex.replacement=/webhook/qulay/$1
       - traefik.http.routers.n8n-webhook-qulay.middlewares=n8n-qulay-webhook@docker,n8n@docker,n8n-error-pages@docker
       - traefik.http.routers.n8n-webhook-qulay.service=n8n

      # ---------- Final n8n service config ----------
       - traefik.http.services.n8n.loadbalancer.server.port=5678

    environment:
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_HOST=dev.kolberg.uz
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - N8N_RUNNERS_ENABLED=true
      - NODE_ENV=production
      - WEBHOOK_URL=https://dev.kolberg.uz
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE}
      - TZ=${GENERIC_TIMEZONE}
      - N8N_CONCURRENCY_PRODUCTION_LIMIT=10
      - N8N_PROXY_HOPS=1

      - N8N_DEFAULT_CORS=true
      - N8N_CORS_ALLOW_ORIGIN=https://neuron.kolberg.uz,https://construction.kolberg.uz,https://lemonfit.kolberg.uz,https://main.kolberg.uz

      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=720
      - EXECUTIONS_DATA_PRUNE_MAX_COUNT=10000
      - EXECUTIONS_TIMEOUT=300
      - EXECUTIONS_TIMEOUT_MAX=432000

      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=db
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_N8N_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_N8N_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_N8N_PASSWORD}
      - DB_POSTGRESDB_SCHEMA=public
      - N8N_LOG_LEVEL=debug

    volumes:
      - n8n_data:/home/node/.n8n
      - ./local-files:/files
    # >>> CHANGE: n8n в public (для trmakeaefik) и backend (т.к. ходит в db)
    networks:
      - traefik-public
      - backend
      - chromium

  error-pages:
    image: nginx:alpine
    container_name: error-pages
    restart: always
    volumes:
      - ./error-pages:/usr/share/nginx/html:ro
    labels:
      - traefik.enable=true
      - traefik.docker.network=n8n_traefik-public
      - traefik.http.services.error-pages.loadbalancer.server.port=80

      # Serve custom pages for 404 and 409
      - traefik.http.middlewares.n8n-error-pages.errors.status=404,409
      - traefik.http.middlewares.n8n-error-pages.errors.service=error-pages
      - traefik.http.middlewares.n8n-error-pages.errors.query=/{status}.html
    # >>> CHANGE: только public
    networks:
      - traefik-public


  db_backup:
    image: postgres:17
    container_name: db_backup
    restart: always
    depends_on:
      - db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /opt/backups/postgres:/backups
    command: >
      bash -c "
      while true; do
        now_hm=$$(date +%H:%M) ;
        today=$$(date +%F) ;
        last_backup=$$(cat /tmp/last_db_backup_date 2>/dev/null || true) ;
        if [ \"$$now_hm\" = \"01:00\" ] && [ \"$$today\" != \"$$last_backup\" ]; then
          ts=$$(date +%F-%H%M) ;
          pg_dumpall -h db -U \"$POSTGRES_USER\" | gzip > /backups/postgres-all-$$ts.sql.gz ;
          find /backups -type f -name 'postgres-all-*.sql.gz' -mtime +7 -delete ;
          echo \"$$today\" > /tmp/last_db_backup_date ;
        fi ;
        sleep 30 ;
      done"
    # >>> CHANGE: backup только backend
    networks:
      - backend

  # RCLONE_CONFIG_DIR: каталог с rclone.conf на хосте (внутри → /config/rclone).
  # Для rclone из Snap: /home/USER/snap/rclone/current/.config/rclone — «current» всегда на актуальную ревизию, reconnect обновляет тот же путь.
  # Задать в .env, например: RCLONE_CONFIG_DIR=/home/ddavlet/snap/rclone/current/.config/rclone
  # n8n в Postgres (см. сервис n8n: DB_*) — попадает в pg_dumpall у db_backup; отдельные tar больше не синкаем.
  gdrive_backup_sync:
    image: rclone/rclone:latest
    container_name: gdrive_backup_sync
    restart: always
    # Сколько дней держать архивы в Drive (имя файла + min-age по времени на remote). ~2.2–2.6 ГБ на дамп PG.
    environment:
      - GDRIVE_RETENTION_DAYS=4
    entrypoint:
      - /bin/sh
      - -lc
      - |
        while true; do
          now_hm=$$(date +%H:%M);
          today=$$(date +%F);
          last_sync=$$(cat /tmp/last_sync_date 2>/dev/null || true);
          if [ "$$now_hm" = "02:00" ] && [ "$$today" != "$$last_sync" ]; then
            latest_pg=$$(ls -1t /backups/postgres/postgres-all-*.sql.gz 2>/dev/null | sed -n '1p');
            if [ -n "$$latest_pg" ]; then
              rclone copyto "$$latest_pg" gdrive:kolberg-backups/postgres-latest.sql.gz;
              rclone copyto "$$latest_pg" "gdrive:kolberg-backups/postgres-daily/$${today}.sql.gz";
              rclone delete "gdrive:kolberg-backups/postgres-daily/" --include "*.sql.gz" --min-age "$${GDRIVE_RETENTION_DAYS}d" || true;
            fi;
            echo "$$today" > /tmp/last_sync_date;
          fi;
          sleep 30;
        done
    volumes:
      - /opt/backups/postgres:/backups/postgres:ro
      - ${RCLONE_CONFIG_DIR:-/opt/backups/rclone}:/config/rclone:ro

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: always
    security_opt:
      - no-new-privileges:true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    labels:
      - traefik.enable=true
      - traefik.docker.network=n8n_traefik-public

      - traefik.http.routers.portainer.rule=Host(`docker.kolberg.uz`)
      - traefik.http.routers.portainer.entrypoints=web,websecure
      - traefik.http.routers.portainer.tls=true
      - traefik.http.routers.portainer.tls.certresolver=mytlschallenge

      - traefik.http.services.portainer.loadbalancer.server.port=9000
    networks:
      - traefik-public

  backend:
    build: ./backend
    container_name: django
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_WEB_DB}
      POSTGRES_USER: ${POSTGRES_WEB_USER}
      POSTGRES_PASSWORD: ${POSTGRES_WEB_PASSWORD}
      POSTGRES_HOST: "db"
      POSTGRES_PORT: 5432
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-to-a-long-random-secret-key-32-plus-bytes}
      DJANGO_DEBUG: "False"
      N8N_TOKEN: ${N8N_TOKEN}
      CORPORATE_INVESTMENTS_ALLOWED_USER: ddavlet, r.davletyarov
    volumes:
      - ./backend:/app
    depends_on:
      - db
    command: >
      sh -c "
      python manage.py migrate &&
      gunicorn config.wsgi:application --bind 0.0.0.0:8000
      "
    labels:
      - traefik.enable=true
      - traefik.docker.network=n8n_traefik-public
      - traefik.http.services.django.loadbalancer.server.port=8000

      # login.kolberg.uz (оставляем как есть)
      - traefik.http.routers.django-login.rule=Host(`login.kolberg.uz`)
      - traefik.http.routers.django-login.entrypoints=web,websecure
      - traefik.http.routers.django-login.tls=true
      - traefik.http.routers.django-login.tls.certresolver=mytlschallenge
      - traefik.http.routers.django-login.service=django
      - traefik.http.routers.django-login.priority=1000

      # tenants: только /web/*
      - traefik.http.routers.django-web.rule=(Host(`lemonfit.kolberg.uz`) || Host(`lemonfit2.kolberg.uz`) || Host(`neuron.kolberg.uz`)) && PathPrefix(`/web/`)
      - traefik.http.routers.django-web.entrypoints=web,websecure
      - traefik.http.routers.django-web.tls=true
      - traefik.http.routers.django-web.tls.certresolver=mytlschallenge
      - traefik.http.routers.django-web.service=django
      - traefik.http.routers.django-web.priority=1000

    networks:
      - traefik-public
      - backend

  backend_v2:
    build: ./backend_v2
    container_name: django_v2
    restart: always
    environment:
      # Separate DB creds so v2 doesn't share auth tables with v1
      POSTGRES_DB: ${POSTGRES_V2_DB}
      POSTGRES_USER: ${POSTGRES_V2_USER}
      POSTGRES_PASSWORD: ${POSTGRES_V2_PASSWORD}
      POSTGRES_HOST: "db"
      POSTGRES_PORT: 5432

      BASE_DOMAIN: ${DOMAIN_NAME}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-to-a-long-random-secret-key-32-plus-bytes}
      # Override in `.env` next to this file: DJANGO_DEBUG=true (never leave on in production).
      DJANGO_DEBUG: "${DJANGO_DEBUG:-False}"
      DJANGO_ALLOWED_HOSTS: "main.kolberg.uz,lemonfit.kolberg.uz,lemonfit2.kolberg.uz,neuron.kolberg.uz,lemonaqua.kolberg.uz"
      # No leading/trailing slashes (e.g. n8n). Slashes break Traefik labels: /api/${VAR}/ → /api/n8n//
      N8N_INTEGRATION_URL_PATH: ${N8N_INTEGRATION_URL_PATH:-n8n}
      N8N_INTEGRATION_TOKEN: ${N8N_INTEGRATION_TOKEN:-}
      N8N_TOKEN: ${N8N_TOKEN:-}
      MESSAGING_GATEWAY_SEND_URL: http://tg_gateway:8080/v1/messaging/send
      MESSAGING_GATEWAY_ADMIN_URL: http://tg_gateway:8080
    volumes:
      - ./backend_v2:/app
    depends_on:
      - db
    command: >
      sh -c "
      python manage.py migrate &&
      gunicorn config.wsgi:application --bind 0.0.0.0:8001 --workers 3 --timeout 120
      "
    labels:
      - traefik.enable=true
      - traefik.docker.network=n8n_traefik-public
      - traefik.http.services.django-v2.loadbalancer.server.port=8001

      # tenants: /api/* except n8n integration prefix (that prefix has its own router below)
      - traefik.http.routers.django-v2-api.rule=(Host(`main.kolberg.uz`) || Host(`lemonfit.kolberg.uz`) || Host(`lemonfit2.kolberg.uz`) || Host(`neuron.kolberg.uz`) || Host(`lemonaqua.kolberg.uz`)) && PathPrefix(`/api`) && !PathPrefix(`/api/${N8N_INTEGRATION_URL_PATH:-n8n}/`) && !PathPrefix(`/api/messaging-gateway/`)
      - traefik.http.routers.django-v2-api.entrypoints=web,websecure
      - traefik.http.routers.django-v2-api.tls=true
      - traefik.http.routers.django-v2-api.tls.certresolver=mytlschallenge
      - traefik.http.routers.django-v2-api.service=django-v2
      - traefik.http.routers.django-v2-api.priority=1100

      # Integration API: must beat Host-only n8n webhooks on the same hosts (priority > django-v2-api)
      - traefik.http.routers.django-v2-n8n.rule=(Host(`main.kolberg.uz`) || Host(`lemonfit.kolberg.uz`) || Host(`lemonaqua.kolberg.uz`) || Host(`neuron.kolberg.uz`)) && PathPrefix(`/api/${N8N_INTEGRATION_URL_PATH:-n8n}/`)
      - traefik.http.routers.django-v2-n8n.entrypoints=web,websecure
      - traefik.http.routers.django-v2-n8n.tls=true
      - traefik.http.routers.django-v2-n8n.tls.certresolver=mytlschallenge
      - traefik.http.routers.django-v2-n8n.service=django-v2
      - traefik.http.routers.django-v2-n8n.priority=1200
    networks:
      traefik-public:
      backend:
        aliases:
          - kolberg-django-v2
      gateway:
        aliases:
          - kolberg-django-v2

  tg-gateway:
    build: ./tg-gateway
    container_name: tg_gateway
    restart: always
    environment:
      BACKEND_WEBHOOK_URL: http://kolberg-django-v2:8001/api/messaging-gateway/webhook/
      PUBLIC_WEBHOOK_BASE_URL: ${TG_GATEWAY_PUBLIC_BASE_URL:-https://tg-gateway.kolberg.uz}
      CALLBACK_COOLDOWN_SECS: ${CALLBACK_COOLDOWN_SECS:-10}
      DATABASE_URL: ${TG_GATEWAY_DATABASE_URL:-}
    labels:
      - traefik.enable=true
      - traefik.docker.network=n8n_traefik-public
      - traefik.http.services.tg-gateway.loadbalancer.server.port=8080
      # External access is limited strictly to Telegram webhook delivery path.
      - traefik.http.routers.tg-gateway-webhook.rule=Host(`${TG_GATEWAY_PUBLIC_HOST:-tg-gateway.kolberg.uz}`) && PathPrefix(`/v1/messaging/webhook/`)
      - traefik.http.routers.tg-gateway-webhook.entrypoints=web,websecure
      - traefik.http.routers.tg-gateway-webhook.tls=true
      - traefik.http.routers.tg-gateway-webhook.tls.certresolver=mytlschallenge
      - traefik.http.routers.tg-gateway-webhook.service=tg-gateway
      - traefik.http.routers.tg-gateway-webhook.priority=1300
    depends_on:
      - backend_v2
    networks:
      # Must share traefik-public with Traefik; otherwise the Docker provider may use the
      # backend-network IP and Traefik (traefik-public only) gets intermittent dial timeouts.
      - traefik-public
      - backend
      - gateway

  frontend_v2:
    build: ./frontend_v2
    container_name: frontend_v2
    restart: always
    labels:
      - traefik.enable=true
      - traefik.docker.network=n8n_traefik-public
      - traefik.http.services.frontend-v2.loadbalancer.server.port=80

      # tenants: /app/*
      - traefik.http.routers.frontend-v2.rule=(Host(`lemonfit.kolberg.uz`) || Host(`lemonfit2.kolberg.uz`) || Host(`neuron.kolberg.uz`) || Host(`lemonaqua.kolberg.uz`)) && PathPrefix(`/app/`) || PathPrefix(`/app`)
      - traefik.http.routers.frontend-v2.entrypoints=web,websecure
      - traefik.http.routers.frontend-v2.tls=true
      - traefik.http.routers.frontend-v2.tls.certresolver=mytlschallenge
      - traefik.http.routers.frontend-v2.service=frontend-v2
      - traefik.http.routers.frontend-v2.priority=1050

    networks:
      - traefik-public

  staticfiles:
    image: nginx:alpine
    container_name: staticfiles
    restart: always
    volumes:
      - ./staticfiles/conf.d:/etc/nginx/conf.d:ro
      - ./backend/staticfiles:/usr/share/nginx/static:ro
    labels:
      - traefik.enable=true
      - traefik.docker.network=n8n_traefik-public
      - traefik.http.services.staticfiles.loadbalancer.server.port=80

      # ---- login.kolberg.uz /static/* ----
      - traefik.http.routers.staticfiles-login.rule=Host(`login.kolberg.uz`) && PathPrefix(`/static/`)
      - traefik.http.routers.staticfiles-login.entrypoints=web,websecure
      - traefik.http.routers.staticfiles-login.tls=true
      - traefik.http.routers.staticfiles-login.tls.certresolver=mytlschallenge
      - traefik.http.routers.staticfiles-login.service=staticfiles
      - traefik.http.routers.staticfiles-login.priority=2000

      # ---- tenants /static/* (добавь сюда нужные хосты) ----
      - traefik.http.routers.staticfiles-tenants.rule=(Host(`lemonfit.kolberg.uz`) || Host(`lemonfit2.kolberg.uz`) || Host(`neuron.kolberg.uz`) || Host(`lemonaqua.kolberg.uz`)) && PathPrefix(`/static/`)
      - traefik.http.routers.staticfiles-tenants.entrypoints=web,websecure
      - traefik.http.routers.staticfiles-tenants.tls=true
      - traefik.http.routers.staticfiles-tenants.tls.certresolver=mytlschallenge
      - traefik.http.routers.staticfiles-tenants.service=staticfiles
      - traefik.http.routers.staticfiles-tenants.priority=2000

    networks:
      - traefik-public

  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:latest
    container_name: wg-easy
    network_mode: "host"
    environment:
      WG_HOST: 85.9.200.143
      WG_DEFAULT_ADDRESS: 10.8.0.x
      WG_DEFAULT_DNS: 8.8.8.8
      WG_ALLOWED_IPS: 0.0.0.0/0,::/0
      # Outbound NIC for NAT in wg0.conf PostUp (`ip route get 8.8.8.8` → dev …). Wrong default breaks internet after reboot.
      WG_DEVICE: eth2
      PASSWORD_HASH: ${WG_PASSWORD_HASH}
    volumes:
      - ./wg:/etc/wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    restart: unless-stopped

  garlic-hub:
    image: sagiadinos/garlic-hub:latest
    container_name: garlic-hub
    restart: unless-stopped
    volumes:
      - garlic-hub-public-var:/var/www/public/var
      - garlic-hub-var:/var/www/var
    labels:
      - traefik.enable=true
      - traefik.docker.network=n8n_traefik-public
      - traefik.http.routers.garlic-hub.rule=Host(`signage.kolberg.uz`)
      - traefik.http.routers.garlic-hub.entrypoints=web,websecure
      - traefik.http.routers.garlic-hub.tls=true
      - traefik.http.routers.garlic-hub.tls.certresolver=mytlschallenge
      - traefik.http.services.garlic-hub.loadbalancer.server.port=80
    networks:
      - traefik-public

volumes:
  n8n_data:
  traefik_data:
  pg_data:
  portainer_data:
  claude_sessions:
  garlic-hub-public-var:
  garlic-hub-var:
# >>> CHANGE: добавили сети
networks:
  traefik-public:
  backend:
  chromium:
  gateway:
    internal: true
