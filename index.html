<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система отчетов</title>
    <style>
        :root {
            --bg: #0b0c0f;
            --card: #12141a;
            --muted: #8b95a7;
            --accent: #4f8cff;
            --ok: #17c964;
            --bad: #f31260;
            --warn: #f5a524;
            --chip: #232733;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: #e5e7eb;
            font: 14px/1.4 system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: var(--card);
            border: 1px solid #1f2430;
            border-radius: 14px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        h1 {
            margin: 0 0 30px;
            font-size: 24px;
            text-align: center;
            color: #e5e7eb;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #cbd5e1;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            background: #0f1218;
            border: 1px solid #2a3342;
            border-radius: 8px;
            color: #e5e7eb;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: var(--accent);
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background: #3d7bff;
        }

        .error {
            color: var(--bad);
            font-size: 12px;
            margin-top: 8px;
            display: none;
        }

        .error.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Вход в систему</h1>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Имя пользователя</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn">Войти</button>
            <div class="error" id="errorMessage">Неверные учетные данные</div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');
            const submitBtn = document.querySelector('.btn');

            // Show loading state
            submitBtn.textContent = 'Вход...';
            submitBtn.disabled = true;

            try {
                // Try to authenticate by making a request to the reports endpoint
                const response = await fetch('https://dev1.ddavlety.com/reports/requests', {
                    method: 'GET',
                    credentials: 'include',
                    headers: {
                        'Authorization': 'Basic ' + btoa(username + ':' + password),
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    // Store authentication state
                    localStorage.setItem('authenticated', 'true');
                    localStorage.setItem('username', username);
                    localStorage.setItem('authHeader', 'Basic ' + btoa(username + ':' + password));

                    // Redirect to dashboard
                    window.location.href = 'dashboard.html';
                } else {
                    throw new Error('Authentication failed');
                }
            } catch (error) {
                console.error('Login error:', error);
                errorMessage.classList.add('show');
                setTimeout(() => {
                    errorMessage.classList.remove('show');
                }, 3000);
            } finally {
                // Reset button state
                submitBtn.textContent = 'Войти';
                submitBtn.disabled = false;
            }
        });

        // Check if already authenticated
        if (localStorage.getItem('authenticated') === 'true') {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
