<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель управления</title>
    <style>
        :root {
            --bg: #0b0c0f;
            --card: #12141a;
            --muted: #8b95a7;
            --accent: #4f8cff;
            --ok: #17c964;
            --bad: #f31260;
            --warn: #f5a524;
            --chip: #232733;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: #e5e7eb;
            font: 14px/1.4 system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, sans-serif;
        }

        header {
            background: var(--card);
            border-bottom: 1px solid #1f2430;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            margin: 0;
            font-size: 20px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logout-btn {
            background: #1f2430;
            color: #cbd5e1;
            border: 1px solid #2a3342;
            border-radius: 8px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 12px;
            transition: background-color 0.2s;
        }

        .logout-btn:hover {
            background: #2a3342;
        }

        main {
            padding: 24px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            max-width: 800px;
            margin: 0 auto;
        }

        .report-card {
            background: var(--card);
            border: 1px solid #1f2430;
            border-radius: 14px;
            padding: 24px;
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .report-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .report-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .report-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .report-description {
            color: var(--muted);
            font-size: 14px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <header>
        <h1>Система отчетов</h1>
        <div class="user-info">
            <span>Добро пожаловать, <span id="username"></span></span>
            <button class="logout-btn" onclick="logout()">Выйти</button>
        </div>
    </header>

    <main>
        <div class="dashboard-grid">
            <div class="report-card" onclick="openReport('payments')">
                <div class="report-icon">📋</div>
                <div class="report-title">Согласования по заявкам</div>
                <div class="report-description">Просмотр статуса заявок на оплату и процесса их согласования</div>
            </div>

            <div class="report-card" onclick="openReport('assets')">
                <div class="report-icon">🏢</div>
                <div class="report-title">Активы по комнатам</div>
                <div class="report-description">Инвентаризация активов, распределенных по комнатам и локациям</div>
            </div>
        </div>
    </main>

    <script>
        // Check authentication
        if (localStorage.getItem('authenticated') !== 'true') {
            window.location.href = 'index.html';
        }

        // Display username
        document.getElementById('username').textContent = localStorage.getItem('username') || 'Пользователь';

        function logout() {
            localStorage.removeItem('authenticated');
            localStorage.removeItem('username');
            window.location.href = 'index.html';
        }

        function openReport(type) {
            if (type === 'payments') {
                window.location.href = 'payments.html';
            } else if (type === 'assets') {
                window.location.href = 'assets.html';
            }
        }
    </script>
</body>
</html>
