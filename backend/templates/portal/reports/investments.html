{% extends "layout/base.html" %}

{% block title %}Инвестиции{% endblock %}

{% block content %}
<div class="wrap">
    <header>
        <div>
            <h1>Инвестиции</h1>
            <div class="sub">
                Дашборд по инвестициям в Metabase. Если ссылка обновится, страница подтянет её автоматически.
            </div>
        </div>
        <div class="controls">
            <a class="btn" href="javascript:history.back()">← Назад</a>
            <a class="btn" href="/web/reports/">К отчётам</a>
            <a class="btn" href="/web/">На главную</a>
        </div>
    </header>

    <div class="card">
        <div class="table-wrap" style="padding: 0;">
            <iframe
                id="investments-frame"
                src=""
                frameborder="0"
                width="100%"
                height="640"
                allowtransparency="true"
                loading="lazy"
                style="border:0; width:100%; min-height:640px; background:#fff;"
            ></iframe>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Подтягиваем актуальный iframe src с бекенда (/web/investments-data)
    document.addEventListener("DOMContentLoaded", () => {
        const frame = document.getElementById("investments-frame");
        if (!frame) return;

        fetch("/web/investments-data", {
            method: "GET",
            credentials: "include",
            headers: { "Accept": "application/json" },
        })
            .then((res) => {
                if (!res.ok) throw new Error(`HTTP ${res.status} ${res.statusText}`);
                return res.json();
            })
            .then((payload) => {
                let url = null;

                if (Array.isArray(payload)) {
                    const first = payload[0];
                    if (first && typeof first === "object") {
                        url = first.url || first.iframe_url || first.src || first.link;
                    } else if (typeof first === "string") {
                        url = first;
                    }
                } else if (payload && typeof payload === "object") {
                    url = payload.url || payload.iframe_url || payload.src || payload.link;
                } else if (typeof payload === "string") {
                    url = payload;
                }

                if (url && typeof url === "string") {
                    frame.src = url;
                }
            })
            .catch((err) => {
                console.error("Investments iframe URL load error:", err);
            });
    });
</script>
{% endblock %}
