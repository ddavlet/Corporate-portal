<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Согласования по заявкам</title>
  <style>
    :root{--bg:#0b0c0f;--card:#12141a;--muted:#8b95a7;--accent:#4f8cff;--ok:#17c964;--bad:#f31260;--warn:#f5a524;--chip:#232733}
    *{box-sizing:border-box}
    body{margin:0;background:#0b0c0f;color:#e5e7eb;font:14px/1.4 system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,sans-serif}
    header{padding:20px 24px 0;display:flex;justify-content:space-between;align-items:center}
    h1{margin:0 0 12px;font-size:20px}
    .back-btn{background:#1f2430;color:#cbd5e1;border:1px solid #2a3342;border-radius:8px;padding:8px 16px;cursor:pointer;font-size:12px;text-decoration:none;display:inline-block}
    .back-btn:hover{background:#2a3342}
    .panel{background:var(--card);border:1px solid #1f2430;border-radius:14px;padding:14px 14px 10px;display:none}
    main{padding:16px 24px}
    .table-card{background:var(--card);border:1px solid #1f2430;border-radius:14px;overflow:hidden}
    table{width:100%;border-collapse:collapse}
    thead th{background:#171a21;border-bottom:1px solid #232733;padding:10px 12px;text-align:left;font-weight:600;user-select:none}
    thead th.sortable{cursor:pointer}
    thead th .sort{opacity:.6;font-size:11px;margin-left:6px}
    tbody td{border-top:1px solid #141821;padding:10px 12px;vertical-align:top}
    tbody tr:hover{background:#121722}
    .muted{color:#8b95a7}
    .link{color:#9ec1ff;cursor:pointer}
    .status{display:inline-flex;gap:8px;align-items:center;padding:4px 10px;border:1px solid #2a3342;border-radius:999px;background:var(--chip);font-size:12px}
    .status.APPROVED{border-color:#19442c;color:#a7f3d0;background:rgba(23,201,100,.08)}
    .status.REJECTED{border-color:#4a1d23;color:#fecaca;background:rgba(243,18,96,.08)}
    .status.UNDER_REVIEW{border-color:#1f2e55;color:#c7d2fe;background:rgba(79,140,255,.08)}
    .status.approved{border-color:#19442c;color:#a7f3d0;background:rgba(23,201,100,.08)}
    .status.rejected{border-color:#4a1d23;color:#fecaca;background:rgba(243,18,96,.08)}
    .status.pending{border-color:#4b3a13;color:#fde68a;background:rgba(245,165,36,.12)}
    dialog{border:1px solid #2a3342;border-radius:12px;background:#0e1218;color:#e5e7eb;width:min(1100px,96vw)}
    dialog::backdrop{background:rgba(0,0,0,.5)}
    .modal-head{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid #232733}
    .modal-body{padding:14px}
    .close{background:#1f2430;color:#cbd5e1;border:none;border-radius:8px;padding:6px 10px;cursor:pointer}
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Согласования по заявкам</h1>
    </div>
    <a href="dashboard.html" class="back-btn">← Назад к панели</a>
  </header>

  <main>
    <div class="table-card">
      <table id="tbl">
        <thead>
          <tr>
            <th class="sortable" data-key="id">ID заявки <span class="sort"></span></th>
            <th class="sortable" data-key="vendor">Поставщик <span class="sort"></span></th>
            <th class="sortable" data-key="submitted_at">Создана <span class="sort"></span></th>
            <th>Шаги</th>
            <th class="sortable" data-key="status">Статус <span class="sort"></span></th>
            <th class="sortable" data-key="current_step">Текущий шаг <span class="sort"></span></th>
            <th class="sortable" data-key="last_decision_at">Последнее решение <span class="sort"></span></th>
            <th class="sortable" data-key="messages">Сообщения <span class="sort"></span></th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="9" class="muted">Отрисовка…</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <dialog id="modal">
    <div class="modal-head">
      <div><strong>Заявка <span id="m-id"></span></strong></div>
      <button class="close" onclick="modal.close()">Закрыть</button>
    </div>
    <div class="modal-body">
      <div class="table-card" style="background:#0f1218">
        <table>
          <thead>
            <tr>
              <th>№</th><th>Шаг</th><th>Тип</th><th>Согласующий</th><th>Статус</th><th>Дата решения</th><th>Комментарий</th><th>Сообщение отправлено</th><th>ID сообщения</th><th>TG чат</th>
            </tr>
          </thead>
          <tbody id="m-approvals"></tbody>
        </table>
      </div>
    </div>
  </dialog>

  <script>
  // Check authentication
  if (localStorage.getItem('authenticated') !== 'true') {
    window.location.href = 'index.html';
  }

  // API configuration
  const API_BASE = 'https://dev1.ddavlety.com';
  const WEBHOOK_URL = `${API_BASE}/webhook/requests/report`;

  // Global data storage
  let approvalsData = [];
  let isLoading = false;

  // --- хелперы и глобальные переменные ---
  const $ = (s)=>document.querySelector(s);
  const tbody = document.getElementById('tbody');
  const modal = document.getElementById('modal');
  let sortKey = 'id';
  let sortDir = 'asc';

  // --- API functions ---
  async function fetchData() {
    if (isLoading) return;

    isLoading = true;
    tbody.innerHTML = '<tr><td colspan="9" class="muted">Загрузка данных...</td></tr>';

    try {
      const authHeader = localStorage.getItem('authHeader');
      const response = await fetch(WEBHOOK_URL, {
        method: 'GET',
        headers: {
          'Authorization': authHeader,
          'Content-Type': 'application/json'
        }
      });

      if (!response.ok) {
        if (response.status === 401) {
          // Authentication failed, redirect to login
          localStorage.removeItem('authenticated');
          localStorage.removeItem('authHeader');
          window.location.href = 'index.html';
          return;
        }
        throw new Error(`HTTP error! status: ${response.status}`);
      }

      const data = await response.json();
      approvalsData = Array.isArray(data) ? data : [];
      renderList(approvalsData);
    } catch (error) {
      console.error('Error fetching data:', error);
      tbody.innerHTML = '<tr><td colspan="9" class="muted">Ошибка загрузки данных. Проверьте подключение к интернету.</td></tr>';
    } finally {
      isLoading = false;
    }
  }

  const fmtDate = (d)=> d ? new Date(d).toLocaleString('ru-RU', {
    hour:'2-digit', minute:'2-digit', day:'2-digit', month:'2-digit', year:'numeric'
  }) : '';

  // --- маппинги статусов для отображения на русском ---
  function statusLabel(s){
    switch (s) {
      case 'APPROVED': return 'ОДОБРЕНО';
      case 'REJECTED': return 'ОТКЛОНЕНО';
      case 'UNDER_REVIEW': return 'НА РАССМОТРЕНИИ';
      default: return String(s || '');
    }
  }
  function decisionLabel(d){
    const x = (d || 'pending').toLowerCase();
    if (x === 'approved') return 'одобрено';
    if (x === 'rejected') return 'отклонено';
    return 'в ожидании';
  }

  // --- обработчики данных ---
  function stepAggregate(items){
    const decisions = items.map(x=>x.decision);
    if(decisions.includes('rejected')) return 'rejected';
    if(items.length>0 && decisions.every(d=>d==='approved')) return 'approved';
    return 'pending';
  }
  function deriveStatus(items){
    if(items.some(x=>x.decision==='rejected')) return 'REJECTED';
    if(items.length>0 && items.every(x=>x.decision==='approved')) return 'APPROVED';
    return 'UNDER_REVIEW';
  }
  function currentStep(items){
    const byStep = new Map();
    for(const it of items){ if(!byStep.has(it.step)) byStep.set(it.step, []); byStep.get(it.step).push(it); }
    const steps = [...byStep.keys()].sort((a,b)=>a-b);
    for(const s of steps){ if(stepAggregate(byStep.get(s)) !== 'approved') return s; }
    return steps[steps.length-1] || 1;
  }
  function lastDecisionAt(items){
    const dates = items.map(x=> x.decided_at).filter(Boolean).sort();
    return dates.length ? dates[dates.length-1] : '';
  }
  function stepsCompact(items){
    const byStep = new Map();
    for(const it of items){ if(!byStep.has(it.step)) byStep.set(it.step, []); byStep.get(it.step).push(it); }
    const steps = [...byStep.keys()].sort((a,b)=>a-b);
    const icon = (agg)=> agg==='approved' ? '✅' : (agg==='rejected' ? '❌' : '⏳');
    return steps.map(s=> s + icon(stepAggregate(byStep.get(s)))).join(' ');
  }
  function messagesSummary(items){
    const sent = items.filter(x=>x.message_sent).length;
    return sent + '/' + items.length;
  }

  // --- рендеринг ---
  function badge(status){ return '<span class="status ' + status + '">' + statusLabel(status) + '</span>'; }
  function badgeDecision(dec){
    const cls = (dec||'pending').toLowerCase();
    return '<span class="status ' + cls + '">' + decisionLabel(dec) + '</span>';
  }

  function compare(a,b){
    const dir = sortDir==='asc' ? 1 : -1;
    const v1 = a[sortKey], v2 = b[sortKey];
    if(sortKey==='status'){
      const order = {APPROVED:0, UNDER_REVIEW:1, REJECTED:2};
      return ((order[v1]??9) - (order[v2]??9)) * dir;
    }
    if(sortKey==='submitted_at' || sortKey==='last_decision_at'){
      return ((v1?new Date(v1).getTime():0) - (v2?new Date(v2).getTime():0)) * dir;
    }
    if(sortKey==='current_step' || sortKey==='id' || sortKey==='messages'){
      return ((+v1||0) - (+v2||0)) * dir;
    }
    if(typeof v1 === 'string' && typeof v2 === 'string'){
      return v1.localeCompare(v2,'ru') * dir;
    }
    return ((v1??0) - (v2??0)) * dir;
  }

  function setSortIndicators(){
    document.querySelectorAll('thead th.sortable').forEach(th=>{
      const span = th.querySelector('.sort');
      if(!span) return;
      const key = th.dataset.key;
      span.textContent = (key===sortKey) ? (sortDir==='asc'?'▲':'▼') : '';
    });
  }

  function renderList(requests){
    if(!Array.isArray(requests)){
      tbody.innerHTML = '<tr><td colspan="9" class="muted">Неожиданный ответ</td></tr>';
      return;
    }
    if(!requests.length){
      tbody.innerHTML = '<tr><td colspan="9" class="muted">Нет данных</td></tr>';
      return;
    }
    const rows = requests.map(req=>{
      const approvals = Array.isArray(req.approvals)? req.approvals : [];
      const status = req.status && ['APPROVED','REJECTED','UNDER_REVIEW'].includes(req.status)
        ? req.status : deriveStatus(approvals);
      return {
        id: req.id,
        vendor: req.vendor || '',
        submitted_at: req.submitted_at || '',
        steps: stepsCompact(approvals),
        status,
        current_step: approvals.length ? currentStep(approvals) : '',
        last_decision_at: lastDecisionAt(approvals) || '',
        messages: messagesSummary(approvals),
        _approvals: approvals
      };
    });

    rows.sort(compare);

    tbody.innerHTML = rows.map(r=>(
      '<tr>'
        + '<td>#' + r.id + '</td>'
        + '<td>' + r.vendor + '</td>'
        + '<td>' + fmtDate(r.submitted_at) + '</td>'
        + '<td>' + r.steps + '</td>'
        + '<td>' + badge(r.status) + '</td>'
        + '<td>' + r.current_step + '</td>'
        + '<td>' + fmtDate(r.last_decision_at) + '</td>'
        + '<td>' + r.messages + '</td>'
        + '<td><span class="link" data-id="' + r.id + '">Открыть</span></td>'
      + '</tr>'
    )).join('');

    tbody.querySelectorAll('.link').forEach(a=> a.addEventListener('click', ()=> openDetail(Number(a.dataset.id))));
    setSortIndicators();
  }

  function openDetail(requestId){
    const req = approvalsData.find(x=> x.id === requestId);
    if(!req) return;
    document.getElementById('m-id').textContent = '#' + requestId;
    const approvals = (req.approvals||[]).slice().sort((a,b)=> (a.step||0)-(b.step||0) || (a.id||0)-(b.id||0));
    const rowsHtml = approvals.map((x,i)=> (
      '<tr>'
        + '<td>' + (i+1) + '</td>'
        + '<td>' + (x.step ?? '') + '</td>'
        + '<td>' + (x.step_type || '') + '</td>'
        + '<td>' + (x.approver?.name || x.approver_user_id || '') + '</td>'
        + '<td>' + badgeDecision(x.decision) + '</td>'
        + '<td>' + fmtDate(x.decided_at) + '</td>'
        + '<td>' + (x.comment || '') + '</td>'
        + '<td>' + (x.message_sent ? '✓' : '—') + '</td>'
        + '<td>' + (x.message_id ?? '') + '</td>'
        + '<td>' + (x.approver_tg_id ?? '') + '</td>'
      + '</tr>'
    )).join('');
    document.getElementById('m-approvals').innerHTML = rowsHtml || '<tr><td colspan="10" class="muted">Нет данных</td></tr>';
    modal.showModal();
  }

  // --- DOM ready ---
  document.addEventListener('DOMContentLoaded', ()=>{
    document.querySelectorAll('thead th.sortable').forEach(th=>{
      th.addEventListener('click', ()=>{
        const key = th.dataset.key;
        if(!key) return;
        if(sortKey === key) sortDir = (sortDir==='asc') ? 'desc' : 'asc';
        else { sortKey = key; sortDir = 'asc'; }
        renderList(approvalsData);
      });
    });

    // Load data from API
    fetchData();
  });
  </script>
</body>
</html>
