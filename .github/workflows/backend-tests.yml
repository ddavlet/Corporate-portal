name: Backend Tests

on:
  pull_request:
    branches:
      - main
    paths:
      - "backend_v2/**"
      - ".github/workflows/backend-tests.yml"
  workflow_dispatch:

jobs:
  django-tests:
    name: Django tests (PostgreSQL)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: kolberg_test
          POSTGRES_USER: kolberg_user
          POSTGRES_PASSWORD: kolberg_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kolberg_user -d kolberg_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend_v2

    env:
      DJANGO_SECRET_KEY: ci-secret-key
      DJANGO_DEBUG: "False"
      POSTGRES_DB: kolberg_test
      POSTGRES_USER: kolberg_user
      POSTGRES_PASSWORD: kolberg_pass
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: "5432"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend_v2/requirements.txt

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Run Django tests
        run: python manage.py test apps --keepdb -v 2
