services:

  db:
    image: pgvector/pgvector:pg17-trixie
    container_name: kolberg_db_local
    environment:
      POSTGRES_DB: ${POSTGRES_V2_DB}
      POSTGRES_USER: ${POSTGRES_V2_USER}
      POSTGRES_PASSWORD: ${POSTGRES_V2_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - pg_local_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - local

  backend_v2:
    build: ./backend_v2
    container_name: kolberg_backend_local
    environment:
      POSTGRES_DB: ${POSTGRES_V2_DB}
      POSTGRES_USER: ${POSTGRES_V2_USER}
      POSTGRES_PASSWORD: ${POSTGRES_V2_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-local-dev-secret}
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: "*"
      BASE_DOMAIN: localhost
      DJANGO_CSRF_TRUSTED_ORIGINS: "http://localhost:8001,http://test.localhost:8001"
    ports:
      - "8001:8001"
    volumes:
      - ./backend_v2:/app
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py runserver 0.0.0.0:8001
      "
    networks:
      - local

  frontend_v2:
    build: ./frontend_v2
    container_name: kolberg_frontend_local
    ports:
      - "3000:80"
    volumes:
      - ./frontend_v2/nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - local

volumes:
  pg_local_data:

networks:
  local:
